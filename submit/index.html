<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Radar Submit</title>
    <link rel="stylesheet" href="/assets/css/fonts.css">
    <link rel="stylesheet" href="/assets/css/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <link rel="stylesheet" href="/submit/submit.css">
    <script src="/assets/js/marked.min.js"></script>
    <script src="/assets/js/js-yaml.min.js"></script>
    <script src="/assets/js/highlight.min.js"></script>
</head>
<body>
    <main class="submit-shell">
        <header class="submit-header">
            <div>
                <div class="brand-mark">&gt;_ Tech Radar 投稿台</div>
                <h1>提交初稿</h1>
            </div>
            <a class="text-link" href="/">返回读者页</a>
        </header>

        <section class="submit-workbench" id="submit-form-view">
            <div class="submit-stepper" aria-label="投稿步骤">
                <span>1 上传文件</span>
                <span>2 识别作者</span>
                <span>3 预览提交</span>
            </div>

            <section class="submit-panel upload-panel">
                <div class="panel-head">
                    <div>
                        <h2>稿件文件</h2>
                    </div>
                    <span class="status-pill" id="upload-health">未上传</span>
                </div>

                <div class="upload-dropzone" id="submit-dropzone" role="button" tabindex="0" aria-describedby="upload-health">
                    <div class="upload-mark">+</div>
                    <div class="upload-copy">
                        <strong>拖拽稿件到这里</strong>
                    </div>
                    <div class="upload-actions">
                        <button type="button" id="choose-folder-button">选择文件夹</button>
                        <button type="button" class="secondary-button" id="choose-files-button">选择文件</button>
                    </div>
                    <input id="submit-folder-input" type="file" multiple webkitdirectory hidden>
                    <input id="submit-files-input" type="file" multiple hidden>
                </div>

                <div id="submit-file-list" class="file-list file-list-rich"></div>
            </section>

            <section class="submit-panel author-panel">
                <div class="panel-head">
                    <div>
                        <h2>作者信息</h2>
                    </div>
                </div>

                <div class="author-mode">
                    <label class="mode-card">
                        <input type="radio" name="author-mode" value="temporary" checked>
                        <span>
                            <strong>新作者 / 不确定</strong>
                        </span>
                    </label>
                    <label class="mode-card">
                        <input type="radio" name="author-mode" value="known">
                        <span>
                            <strong>已有作者</strong>
                        </span>
                    </label>
                </div>

                <div class="form-grid" id="temporary-author-row">
                    <label><span>中文姓名</span><input id="submitter-name" autocomplete="name"></label>
                    <label><span>团队</span><input id="submitter-team"></label>
                    <label><span>角色</span><input id="submitter-role"></label>
                    <label><span>联系方式</span><input id="submitter-contact" autocomplete="email"></label>
                </div>

                <div class="known-author hidden" id="known-author-row">
                    <label>
                        <span>搜索作者</span>
                        <input id="author-search" placeholder="输入中文名、拼音或首字母">
                    </label>
                    <input id="submitter-author-id" type="hidden">
                    <div id="selected-author" class="selected-author hidden"></div>
                    <div id="author-search-results" class="compact-list"></div>
                </div>
            </section>

            <section class="submit-panel preview-panel">
                <div class="panel-head">
                    <div>
                        <h2>效果预览</h2>
                    </div>
                    <div class="toolbar">
                        <button id="submit-preview-button">预览稿件</button>
                        <button id="submit-button">提交给编辑部</button>
                    </div>
                </div>
                <p class="status-line" id="submit-status"></p>
                <div class="preview-surface submit-preview-surface" id="submit-preview"></div>
            </section>
        </section>

        <section class="submit-panel hidden" id="submit-result-view">
            <h2>投稿已提交</h2>
            <div class="token-box" id="status-url"></div>
            <div class="toolbar">
                <button id="copy-status-button">复制链接</button>
                <button id="open-status-button">打开状态页</button>
            </div>
        </section>

        <section class="submit-panel hidden" id="submission-status-view">
            <div class="panel-head">
                <div>
                    <h2 id="submission-heading">投稿状态</h2>
                    <p class="status-line" id="submission-meta"></p>
                </div>
                <button id="reload-submission-button">刷新状态</button>
            </div>

            <div class="status-grid">
                <section>
                    <h3>编辑部反馈</h3>
                    <div id="submission-review-history" class="compact-list"></div>
                </section>
                <section>
                    <h3>当前文件</h3>
                    <div id="submission-file-list" class="file-list file-list-rich"></div>
                </section>
            </div>

            <section class="revision-panel" id="revision-panel">
                <div class="panel-head">
                    <div>
                        <h3>提交返修版本</h3>
                    </div>
                    <div class="toolbar">
                        <button id="revision-preview-button">预览返修</button>
                        <button id="revision-submit-button">提交返修</button>
                    </div>
                </div>
                <div class="upload-dropzone compact-dropzone" id="revision-dropzone" role="button" tabindex="0">
                    <div class="upload-mark">+</div>
                    <div class="upload-copy">
                        <strong>拖拽返修稿件</strong>
                    </div>
                    <div class="upload-actions">
                        <button type="button" id="revision-folder-button">选择文件夹</button>
                        <button type="button" class="secondary-button" id="revision-files-button">选择文件</button>
                    </div>
                    <input id="revision-folder-input" type="file" multiple webkitdirectory hidden>
                    <input id="revision-files-input" type="file" multiple hidden>
                </div>
                <div id="revision-file-list" class="file-list file-list-rich"></div>
                <p class="status-line" id="revision-status"></p>
            </section>

            <div class="preview-surface submit-preview-surface" id="status-preview"></div>
        </section>
    </main>

    <script type="module" src="/submit/js/submit.js"></script>
</body>
</html>
