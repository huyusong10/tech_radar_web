<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Radar Submit</title>
    <link rel="stylesheet" href="/assets/css/fonts.css">
    <link rel="stylesheet" href="/assets/css/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
    <link rel="stylesheet" href="/submit/submit.css">
    <script src="/assets/js/marked.min.js"></script>
    <script src="/assets/js/js-yaml.min.js"></script>
    <script src="/assets/js/highlight.min.js"></script>
</head>
<body>
    <main class="submit-shell">
        <header class="submit-header">
            <div>
                <div class="brand-mark">&gt;_ Tech Radar Submit</div>
                <h1>Submit Draft</h1>
            </div>
            <a class="text-link" href="/">Reader</a>
        </header>

        <section class="panel" id="submit-form-view">
            <div class="form-grid">
                <label><span>Target volume</span><input id="submit-vol" placeholder="003" required></label>
                <label><span>Folder name</span><input id="submit-folder" placeholder="new-idea" required></label>
                <label><span>Name</span><input id="submitter-name"></label>
                <label><span>Team</span><input id="submitter-team"></label>
                <label><span>Role</span><input id="submitter-role"></label>
                <label><span>Contact</span><input id="submitter-contact"></label>
            </div>

            <div class="author-mode">
                <label><input type="radio" name="author-mode" value="temporary" checked> New author</label>
                <label><input type="radio" name="author-mode" value="known"> Existing author</label>
            </div>

            <div class="form-grid" id="known-author-row">
                <label><span>Author search</span><input id="author-search" placeholder="name / id / team"></label>
                <label><span>Author ID</span><input id="submitter-author-id" placeholder="known_author"></label>
            </div>
            <div id="author-search-results" class="compact-list"></div>

            <input id="submit-files" type="file" multiple webkitdirectory>
            <div id="submit-file-list" class="file-list"></div>

            <div class="toolbar">
                <button id="submit-preview-button">Preview</button>
                <button id="submit-button">Submit</button>
            </div>
            <p class="status-line" id="submit-status"></p>
        </section>

        <section class="panel hidden" id="submit-result-view">
            <h2>Status Link</h2>
            <div class="token-box" id="status-url"></div>
            <div class="toolbar">
                <button id="copy-status-button">Copy</button>
                <button id="open-status-button">Open</button>
            </div>
        </section>

        <section class="panel hidden" id="submission-status-view">
            <div class="panel-head">
                <div>
                    <h2 id="submission-heading">Submission</h2>
                    <p class="status-line" id="submission-meta"></p>
                </div>
                <button id="reload-submission-button">Refresh</button>
            </div>
            <div id="submission-review-history" class="compact-list"></div>
            <div class="toolbar">
                <input id="revision-files" type="file" multiple webkitdirectory>
                <button id="revision-preview-button">Preview revision</button>
                <button id="revision-submit-button">Submit revision</button>
            </div>
            <p class="status-line" id="revision-status"></p>
        </section>

        <section class="panel editor-panel">
            <div class="split-editor">
                <textarea id="submit-editor" spellcheck="false"></textarea>
                <div class="preview-surface" id="submit-preview"></div>
            </div>
        </section>
    </main>

    <script type="module" src="/submit/js/submit.js"></script>
</body>
</html>
